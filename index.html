<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Gradient Turbulence</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    overscroll-behavior: none;
  }
  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
  'use strict';

  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');

  // ---- Value-noise based curl field (turbulence) ------------------------

  function hash(x, y) {
    var s = Math.sin(x * 127.1 + y * 311.7 + seedA) * 43758.5453;
    return s - Math.floor(s);
  }

  function noise(x, y) {
    var xi = Math.floor(x), yi = Math.floor(y);
    var xf = x - xi, yf = y - yi;
    var u = xf * xf * (3 - 2 * xf);
    var v = yf * yf * (3 - 2 * yf);
    var a = hash(xi, yi);
    var b = hash(xi + 1, yi);
    var c = hash(xi, yi + 1);
    var d = hash(xi + 1, yi + 1);
    return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
  }

  function fbm(x, y) {
    var v = 0, amp = 0.5, freq = 1;
    for (var i = 0; i < 4; i++) {
      v += amp * noise(x * freq, y * freq);
      var nx = x * 2.03 + 17.3, ny = y * 2.03 + 9.1;
      x = nx; y = ny;
      freq = 1;
      amp *= 0.5;
    }
    return v;
  }

  var EPS = 0.06;
  function curl(x, y, t) {
    var n1 = fbm(x, y + EPS + t);
    var n2 = fbm(x, y - EPS + t);
    var n3 = fbm(x + EPS, y + t);
    var n4 = fbm(x - EPS, y + t);
    var dx = (n1 - n2) / (2 * EPS);
    var dy = (n3 - n4) / (2 * EPS);
    return [dy, -dx];
  }

  // ---- Scene state, reshuffled on every tap ------------------------------

  var seedA = Math.random() * 1000;
  var scale = 0.0016;
  var hueBase = Math.random() * 360;
  var hueSpan = 90 + Math.random() * 180;
  var flowOffsetX = Math.random() * 1000;
  var flowOffsetY = Math.random() * 1000;
  var speed = 0.14 + Math.random() * 0.2;
  var bgHue = Math.random() * 360;

  function reshuffle(px, py) {
    seedA = Math.random() * 1000;
    scale = 0.0011 + Math.random() * 0.0016;
    hueBase = Math.random() * 360;
    hueSpan = 60 + Math.random() * 220;
    flowOffsetX = Math.random() * 1000;
    flowOffsetY = Math.random() * 1000;
    speed = 0.1 + Math.random() * 0.28;
    bgHue = Math.random() * 360;
    burst(px, py);
  }

  // ---- Particles ----------------------------------------------------------

  var particles = [];
  var W = 0, H = 0, dpr = 1;

  function particleCount() {
    var area = W * H;
    return Math.max(1500, Math.min(4000, Math.round(area / 2800)));
  }

  function spawn(p, x, y) {
    p.x = x !== undefined ? x : Math.random() * W;
    p.y = y !== undefined ? y : Math.random() * H;
    p.life = 0;
    p.maxLife = 120 + Math.random() * 260;
    p.hueJitter = (Math.random() - 0.5) * hueSpan;
  }

  function initParticles() {
    var n = particleCount();
    particles = [];
    for (var i = 0; i < n; i++) {
      var p = {};
      spawn(p);
      p.life = Math.random() * p.maxLife;
      particles.push(p);
    }
  }

  function burst(px, py) {
    var extra = Math.round(particleCount() * 0.25);
    for (var i = 0; i < extra && i < particles.length; i++) {
      var p = particles[(Math.random() * particles.length) | 0];
      var ang = Math.random() * Math.PI * 2;
      var r = Math.random() * 40;
      spawn(p, px + Math.cos(ang) * r, py + Math.sin(ang) * r);
    }
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.round(window.innerWidth);
    H = Math.round(window.innerHeight);
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    initParticles();
  }
  window.addEventListener('resize', resize);

  // ---- Interaction: tap anywhere changes the picture ----------------------

  function onTap(e) {
    e.preventDefault();
    var x = (e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX)) || W / 2;
    var y = (e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY)) || H / 2;
    reshuffle(x, y);
  }
  canvas.addEventListener('pointerdown', onTap);
  canvas.addEventListener('contextmenu', function (e) { e.preventDefault(); });

  // ---- Main loop ------------------------------------------------------------

  var start = performance.now();

  function frame(now) {
    requestAnimationFrame(frame);
    var t = (now - start) / 1000;

    // Slowly tinted fade for long, soft turbulent trails
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'hsla(' + bgHue + ', 40%, 4%, 0.045)';
    ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = 'lighter';

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var nx = p.x * scale + flowOffsetX;
      var ny = p.y * scale + flowOffsetY;
      var v = curl(nx, ny, t * 0.05);
      var vx = v[0] * speed * 60;
      var vy = v[1] * speed * 60 + speed * 8; // gentle downward drift

      p.x += vx;
      p.y += vy;
      p.life++;

      if (p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20 || p.life > p.maxLife) {
        spawn(p);
        continue;
      }

      var fieldVal = fbm(nx, ny);
      var hue = hueBase + fieldVal * hueSpan + p.hueJitter;
      var lifeFrac = p.life / p.maxLife;
      var alpha = Math.sin(Math.min(lifeFrac, 1) * Math.PI) * 0.85;
      var speedMag = Math.min(1, Math.hypot(vx, vy) / (speed * 90));
      var light = 45 + speedMag * 25;
      var size = 1.1 + speedMag * 2.2;
      // Cheap glow: soft wide halo + bright core, no shadowBlur (which is far
      // too slow in Canvas2D at thousands of shapes per frame)
      ctx.beginPath();
      ctx.fillStyle = 'hsla(' + hue + ', 85%, ' + light + '%, ' + (alpha * 0.18) + ')';
      ctx.arc(p.x, p.y, size * 3.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.fillStyle = 'hsla(' + hue + ', 85%, ' + light + '%, ' + alpha + ')';
      ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
